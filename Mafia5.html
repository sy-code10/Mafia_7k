<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mafia Game Advanced - Role Lock</title>
    <script src="https://www.gstatic.com/firebasejs/9.0.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.0.0/firebase-database-compat.js"></script>
    <style>
        :root {
            --primary: #6200ee;
            --bg: #121212;
            --card: #1e1e1e;
            --text: #ffffff;
            --accent: #ff4081;
        }

        body { 
            background: var(--bg); 
            color: var(--text); 
            text-align: center; 
            font-family: 'Segoe UI', sans-serif; 
            padding: 20px; 
            margin: 0;
        }

        .box { 
            background: var(--card); 
            padding: 25px; 
            border-radius: 15px; 
            margin: 20px auto; 
            max-width: 400px;
            border: 1px solid #333; 
            box-shadow: 0 4px 15px rgba(0,0,0,0.5);
        }

        .role-text { 
            font-size: 1.4em; 
            font-weight: bold; 
            margin: 15px 0; 
            padding: 12px 25px; 
            border-radius: 50px; 
            display: inline-block;
            text-transform: uppercase;
        }

        /* Role Colors */
        .mafia { background: #b00020; }
        .polisi { background: #007bff; }
        .dokter { background: #28a745; }
        .peramal { background: #ffc107; color: black; }
        .warga { background: #555; }

        .player-item { 
            display: flex; 
            justify-content: space-between; 
            align-items: center; 
            background: #2a2a2a; 
            padding: 12px 15px; 
            margin: 8px 0; 
            border-radius: 10px; 
        }

        .btn-pilih { 
            background: var(--accent); 
            color: white; 
            border: none; 
            padding: 8px 15px; 
            border-radius: 6px; 
            cursor: pointer; 
            font-weight: bold;
        }

        input { 
            padding: 12px; 
            width: 80%; 
            border-radius: 8px; 
            border: 1px solid #444; 
            background: #222;
            color: white;
            margin-bottom: 15px; 
        }

        button#mainBtn { 
            padding: 12px 30px; 
            background: var(--primary); 
            color: white; 
            border: none; 
            border-radius: 8px; 
            font-weight: bold; 
            cursor: pointer;
        }

        #actionText { color: var(--accent); font-style: italic; min-height: 20px; }
    </style>
</head>
<body>

    <h2>🕵️ Mafia Online</h2>

    <div id="lobby" class="box">
        <p>Siap untuk bermain?</p>
        <input type="text" id="inputName" placeholder="Masukkan Nama Anda...">
        <br>
        <button id="mainBtn" onclick="joinGame()">MASUK PERMAINAN</button>
    </div>

    <div id="gameRoom" style="display:none;" class="box">
        <h3 id="displayMyName"></h3>
        <div id="roleDisplay" class="role-text"></div>
        <p id="actionText"></p>
        <hr style="border: 0; border-top: 1px solid #444; margin: 20px 0;">
        <h4 style="text-align: left;">👥 Daftar Pemain:</h4>
        <div id="playerList"></div>
    </div>

    <script>
        // --- KONFIGURASI FIREBASE ---
        const firebaseConfig = {
            apiKey: "AIzaSyAme9eEMI10CqbZwSW164De7l9aKRLjIKQ",
            authDomain: "mafia-game-21d71.firebaseapp.com",
            databaseURL: "https://mafia-game-21d71-default-rtdb.asia-southeast1.firebasedatabase.app",
            projectId: "mafia-game-21d71",
            storageBucket: "mafia-game-21d71.firebasestorage.app",
            messagingSenderId: "548278648888",
            appId: "1:548278648888:web:38d801983fa54057eaa6cd"
        };

        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();
        
        let myRole = "";
        let myName = "";
        const rolesWithAction = ["Mafia", "Polisi", "Dokter", "Peramal"];

        function joinGame() {
            const input = document.getElementById('inputName');
            myName = input.value.trim();

            if(!myName) return alert("Isi nama dulu!");

            // Random Role Assignment
            const allRoles = ["Mafia", "Polisi", "Dokter", "Peramal", "Warga"];
            myRole = allRoles[Math.floor(Math.random() * allRoles.length)];

            db.ref('players/' + myName).set({
                nama: myName,
                peran: myRole,
                target: "" 
            }).then(() => {
                renderUI();
                listenPlayers();
            });
        }

        function renderUI() {
            document.getElementById('lobby').style.display = 'none';
            document.getElementById('gameRoom').style.display = 'block';
            document.getElementById('displayMyName').innerText = "Halo, " + myName;
            
            const rd = document.getElementById('roleDisplay');
            rd.innerText = myRole;
            rd.className = "role-text " + myRole.toLowerCase();

            const actionHint = {
                "Mafia": "Pilih siapa yang ingin kamu eliminasi!",
                "Polisi": "Pilih seseorang untuk diperiksa!",
                "Dokter": "Pilih seseorang untuk dilindungi!",
                "Peramal": "Pilih seseorang untuk diterawang!",
                "Warga": "Kamu tidak punya aksi malam. Tunggu pagi hari!"
            };
            document.getElementById('actionText').innerText = actionHint[myRole];
        }

        function pilihOrang(targetName) {
            // Validasi tambahan di sisi fungsi (security check)
            if (!rolesWithAction.includes(myRole)) {
                return alert("Sebagai Warga, kamu tidak bisa memilih!");
            }
            
            if(targetName === myName) return alert("Jangan pilih diri sendiri!");
            
            alert("Berhasil memilih: " + targetName);
            db.ref('players/' + myName).update({ target: targetName });
        }

        function listenPlayers() {
            db.ref('players').on('value', (snapshot) => {
                const data = snapshot.val();
                const listDiv = document.getElementById('playerList');
                listDiv.innerHTML = "";

                // Cek apakah user punya hak akses tombol
                const canInteract = rolesWithAction.includes(myRole);

                for(let p in data) {
                    const isMe = data[p].nama === myName;
                    
                    // Tombol hanya muncul jika:
                    // 1. Role saya bukan Warga
                    // 2. Nama di list bukan saya sendiri
                    const showButton = canInteract && !isMe;

                    listDiv.innerHTML += `
                        <div class="player-item">
                            <span>👤 ${data[p].nama} ${isMe ? '<b>(Anda)</b>' : ''}</span>
                            ${showButton ? 
                                `<button class="btn-pilih" onclick="pilihOrang('${data[p].nama}')">PILIH</button>` 
                                : ''}
                        </div>`;
                }
            });
        }
    </script>
</body>
</html>
